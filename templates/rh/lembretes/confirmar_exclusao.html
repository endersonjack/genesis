{% extends 'base.html' %}
{% block title %}Excluir lembrete | RH{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">
            <h4 class="mb-3">Excluir lembrete</h4>
            <p>Deseja realmente excluir o lembrete <strong>{{ lembrete.titulo }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Excluir</button>
                <a href="{% url 'rh:calendario_rh' %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
