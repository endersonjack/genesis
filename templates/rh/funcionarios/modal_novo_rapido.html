<form
    method="post"
    hx-post="{% url 'rh:modal_novo_funcionario_rapido' %}"
    hx-target="#modal-content"
    hx-swap="innerHTML">

    {% csrf_token %}

    <div class="modal-header">
        <div>
            <h5 class="modal-title fw-bold mb-1">Novo funcionário</h5>
            <small class="text-muted">
                Cadastre rapidamente e continue no detalhe para preencher o restante.
            </small>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
    </div>

    <div class="modal-body">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label fw-bold">Nome *</label>
                {{ form.nome }}
                {% if form.nome.errors %}
                    <div class="text-danger small mt-1">{{ form.nome.errors|join:", " }}</div>
                {% endif %}
            </div>

            <div class="col-12">
                <label class="form-label fw-bold">CPF *</label>
                {{ form.cpf }}
                {% if form.cpf.errors %}
                    <div class="text-danger small mt-1">{{ form.cpf.errors|join:", " }}</div>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-arrow-right-circle me-1"></i> Continuar
        </button>
    </div>
</form>
