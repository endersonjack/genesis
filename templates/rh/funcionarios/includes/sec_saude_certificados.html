<div class="section-card border-0 shadow-none">
    <div class="section-card-header px-0 pt-0">
        <div>
            <h6 class="mb-1">Certificados</h6>
            <small>Certificados vinculados ao funcionário</small>
        </div>

        <div class="section-header-actions">
            <button
                type="button"
                class="btn btn-light btn-sm"
                hx-get="{% url 'rh:modal_adicionar_certificado' funcionario.pk %}"
                hx-target="#modal-content"
                hx-swap="innerHTML">
                <i class="bi bi-plus-circle me-1"></i> Adicionar
            </button>
        </div>
    </div>

    <div
        id="certificados-lista"
        hx-get="{% url 'rh:certificados_lista' funcionario.pk %}"
        hx-trigger="load">
        <div class="py-4 text-center text-muted">
            Carregando certificados...
        </div>
    </div>
</div>
