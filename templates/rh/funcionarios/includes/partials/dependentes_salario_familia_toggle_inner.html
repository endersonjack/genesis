<form
    method="post"
    id="form-salario-familia-func"
    class="sf-dep-sf-row mb-0"
    data-no-global-loading
    hx-post="{% url 'rh:funcionario_recebe_salario_familia_hx' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
    hx-swap="none"
    hx-trigger="change from:#id_recebe_salario_familia_func">
    {% csrf_token %}
    <span class="small fw-semibold text-nowrap mb-0" id="label-sf-func">Recebe Salário Família?</span>
    <label class="sf-dep-toggle mb-0" for="id_recebe_salario_familia_func">
        <input type="checkbox"
               name="recebe_salario_familia"
               value="1"
               class="sf-dep-toggle-input"
               id="id_recebe_salario_familia_func"
               {% if funcionario.recebe_salario_familia %}checked{% endif %}
               aria-labelledby="label-sf-func">
        <span class="sf-dep-toggle-track" aria-hidden="true">
            <span class="sf-dep-toggle-thumb">
                <i class="bi bi-x-lg" aria-hidden="true"></i>
                <i class="bi bi-check-lg" aria-hidden="true"></i>
            </span>
        </span>
    </label>
</form>
