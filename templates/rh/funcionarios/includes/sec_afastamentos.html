<section class="section-panel" data-panel="afastamentos">
    <div class="section-card">
        <div class="section-card-header">
            <div>
                <h5>Afastamentos</h5>
                <small>Registros de afastamentos do funcionário</small>
            </div>

            <div class="section-header-actions">
                <button
                    type="button"
                    class="btn btn-light btn-sm"
                    hx-get="{% url 'rh:modal_adicionar_afastamento' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
                    hx-target="#modal-content"
                    hx-swap="innerHTML">
                    <i class="bi bi-plus-circle me-1"></i> Adicionar
                </button>
            </div>
        </div>

        <div
            class="section-card-body"
            id="afastamentos-lista"
            hx-get="{% url 'rh:afastamentos_lista' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
            hx-trigger="load">
            <div class="py-4 text-center text-muted">
                Carregando registros de afastamentos...
            </div>
        </div>
    </div>
</section>
