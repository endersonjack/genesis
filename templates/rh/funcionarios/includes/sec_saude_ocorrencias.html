<div class="section-card border-0 shadow-none">
    <div class="section-card-header px-0 pt-0">
        <div>
            <h6 class="mb-1">Ocorrências de Saúde</h6>
            <small>Acidentes, doenças e outras ocorrências registradas</small>
        </div>

        <div class="section-header-actions">
            <button
                type="button"
                class="btn btn-light btn-sm"
                hx-get="{% url 'rh:modal_adicionar_ocorrencia_saude' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
                hx-target="#modal-content"
                hx-swap="innerHTML">
                <i class="bi bi-plus-circle me-1"></i> Adicionar
            </button>
        </div>
    </div>

    <div
        id="ocorrencias-saude-lista"
        hx-get="{% url 'rh:ocorrencias_saude_lista' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
        hx-trigger="load">
        <div class="py-4 text-center text-muted">
            Carregando ocorrências de saúde...
        </div>
    </div>
</div>
