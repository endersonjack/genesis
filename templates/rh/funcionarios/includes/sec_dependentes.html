<style>
    .sf-dep-sf-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0.5rem 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.85rem;
        background: #f8fafc;
    }
    .sf-dep-toggle {
        position: relative;
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
        cursor: pointer;
        margin: 0;
    }
    .sf-dep-toggle-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        margin: 0;
        cursor: pointer;
        z-index: 2;
    }
    .sf-dep-toggle-track {
        width: 52px;
        height: 28px;
        border-radius: 999px;
        background: #e2e8f0;
        position: relative;
        transition: background 0.2s ease;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .sf-dep-toggle-input:focus-visible + .sf-dep-toggle-track {
        outline: 2px solid #93c5fd;
        outline-offset: 2px;
    }
    .sf-dep-toggle-input:checked + .sf-dep-toggle-track {
        background: #22c55e;
    }
    .sf-dep-toggle-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.12);
        transition: transform 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }
    .sf-dep-toggle-input:checked + .sf-dep-toggle-track .sf-dep-toggle-thumb {
        transform: translateX(24px);
    }
    .sf-dep-toggle-thumb .bi-check-lg {
        display: none;
        font-size: 0.85rem;
        color: #16a34a;
    }
    .sf-dep-toggle-thumb .bi-x-lg {
        font-size: 0.75rem;
        color: #94a3b8;
    }
    .sf-dep-toggle-input:checked + .sf-dep-toggle-track .sf-dep-toggle-thumb .bi-check-lg {
        display: block;
    }
    .sf-dep-toggle-input:checked + .sf-dep-toggle-track .sf-dep-toggle-thumb .bi-x-lg {
        display: none;
    }
</style>
<section class="section-panel {% if secao_inicial == 'dependentes' %}active{% endif %}" data-panel="dependentes">
    <div class="section-card">
        <div class="section-card-header flex-wrap gap-2">
            <div>
                <h5>Dependentes</h5>
                <small>Registros vinculados ao funcionário</small>
            </div>

            <div class="section-header-actions d-flex flex-wrap align-items-center gap-2 gap-md-3">
                <div id="dependentes-sf-toggle-wrap">
                    {% include 'rh/funcionarios/includes/partials/dependentes_salario_familia_toggle_inner.html' %}
                </div>

                <button
                    type="button"
                    class="btn btn-light btn-sm"
                    hx-get="{% url 'rh:modal_adicionar_dependente' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
                    hx-target="#modal-content"
                    hx-swap="innerHTML">
                    <i class="bi bi-plus-circle me-1"></i> Adicionar
                </button>
            </div>
        </div>

        <div
            class="section-card-body"
            id="dependentes-lista"
            hx-get="{% url 'rh:dependentes_lista' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
            hx-trigger="load">
            <div class="py-4 text-center text-muted">
                Carregando dependentes...
            </div>
        </div>
    </div>
</section>
