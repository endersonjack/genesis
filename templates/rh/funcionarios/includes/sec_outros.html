<section class="section-panel {% if secao_inicial == 'outros' %}active{% endif %}" data-panel="outros" id="sec-outros">
    <div class="section-card">

        <div class="section-card-header">
            <div>
                <h5>Outros</h5>
                <small>Dados complementares do cadastro</small>
            </div>

            <div class="section-header-actions">
                <button
                    type="button"
                    class="btn btn-light btn-sm"
                    hx-get="{% url 'rh:modal_editar_outros' empresa_id=request.empresa_ativa.pk pk=funcionario.pk %}"
                    hx-target="#modal-content"
                    hx-swap="innerHTML">
                    <i class="bi bi-pencil-square me-1"></i> Editar seção
                </button>
            </div>
        </div>

        <div class="section-card-body">

            <div class="modal-section-wrap">

                <div class="modal-block">
                    <div class="modal-block-title">
                        <i class="bi bi-info-circle"></i>
                        Informações complementares
                    </div>

                    <div class="info-grid">

                        <div class="info-box span-6 hover-card">
                            <span class="info-label">eSocial</span>
                            <div class="info-value">
                                {{ funcionario.e_social|default:"—" }}
                            </div>
                        </div>

                        <div class="info-box span-6 hover-card">
                            <span class="info-label">Analfabeto</span>
                            <div class="info-value">
                                {% if funcionario.analfabeto %}
                                    Sim
                                {% else %}
                                    Não
                                {% endif %}
                            </div>
                        </div>

                    </div>
                </div>

                <div class="modal-block">
                    <div class="modal-block-title">
                        <i class="bi bi-chat-left-text"></i>
                        Observações
                    </div>

                    <div class="info-grid">

                        <div class="info-box span-12 hover-card">
                            <span class="info-label">Observações gerais</span>
                            <div class="info-value muted">
                                {{ funcionario.observacoes|default:"—" }}
                            </div>
                        </div>

                    </div>
                </div>

            </div>

        </div>
    </div>
</section>
