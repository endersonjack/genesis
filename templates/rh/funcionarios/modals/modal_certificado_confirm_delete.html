<div class="modal-header">
    <div>
        <h5 class="modal-title mb-1">Excluir certificado</h5>
        <small class="text-muted text-uppercase">{{ funcionario.nome }}</small>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form
    method="post"
    class="section-modal-form compact"
    hx-post="{% url 'rh:modal_excluir_certificado' empresa_id=request.empresa_ativa.pk pk=funcionario.pk certificado_id=item.pk %}"
    hx-target="#certificados-lista"
    hx-swap="innerHTML">
    {% csrf_token %}

    <div class="modal-body section-modal-body">
        <div class="modal-section-wrap">
            <div class="modal-block">
                <div class="modal-block-title text-danger">
                    <i class="bi bi-trash"></i>
                    <span>Confirmar exclusão</span>
                </div>

                <div class="alert alert-warning mb-0">
                    <div class="fw-semibold mb-2">
                        Confirma a exclusão deste certificado?
                    </div>

                    <div class="mb-2">
                        <strong>Tipo:</strong>
                        {{ item.get_tipo_display|default:item.tipo|default:"—" }}
                    </div>

                    <div class="mb-0">
                        <strong>Data:</strong>
                        {{ item.data|date:"d/m/Y"|default:"—" }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-footer modal-footer-fixed">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
        </button>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Excluir
        </button>
    </div>
</form>
