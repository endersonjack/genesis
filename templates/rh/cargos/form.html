{% extends 'base.html' %}

{% block title %}{{ titulo }} | Genesis ERP{% endblock %}

{% block content %}
<style>
    .rh-card {
        border: 1px solid #d9e2ec;
        border-radius: 1rem;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        overflow: hidden;
    }

    .rh-card-header {
        padding: 1rem 1.25rem;
        color: #fff;
        {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
            background: {{ request.empresa_ativa.cor_tema }};
        {% else %}
            background: #334155;
        {% endif %}
    }

    .rh-card-body {
        padding: 1.25rem;
        background: #f8fafc;
    }
</style>

<form method="post">
    {% csrf_token %}

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h2 class="fw-bold mb-1">{{ titulo }}</h2>
            <p class="text-muted mb-0">{{ subtitulo }}</p>
        </div>

        <div class="d-flex gap-2">
            <a href="{% url 'rh:lista_cargos' %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Voltar
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle me-1"></i> Salvar
            </button>
        </div>
    </div>

    <div class="rh-card">
        <div class="rh-card-header">
            <h5 class="mb-0">Dados do cargo</h5>
        </div>
        <div class="rh-card-body">
            <div class="row g-3">
                <div class="col-12 col-lg-6">
                    <label class="form-label">
                        Nome do cargo <span class="text-danger">*</span>
                    </label>
                    {{ form.nome }}
                    {% if form.nome.errors %}
                        <div class="text-danger small mt-1">
                            {{ form.nome.errors|join:", " }}
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
