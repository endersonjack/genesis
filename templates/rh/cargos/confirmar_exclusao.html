{% extends 'base.html' %}

{% block title %}Excluir cargo | Genesis ERP{% endblock %}

{% block content %}
<style>
    .rh-card {
        border: 1px solid #d9e2ec;
        border-radius: 1rem;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        overflow: hidden;
    }
</style>

<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="rh-card p-4 p-lg-5 text-center">
            <div class="mb-3">
                <i class="bi bi-trash text-danger" style="font-size: 3rem;"></i>
            </div>

            <h3 class="fw-bold mb-2">Excluir cargo</h3>
            <p class="text-muted mb-4">
                Tem certeza que deseja excluir o cargo
                <strong>{{ cargo.nome }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                    <a href="{% url 'rh:lista_cargos' %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i> Confirmar exclusão
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
