<form
    method="post"
    hx-post="{% url 'rh:modal_cargo_excluir' empresa_id=request.empresa_ativa.pk pk=cargo.pk %}"
    hx-target="#modal-content"
    hx-swap="innerHTML"
    data-no-global-loading>
    {% csrf_token %}
    <input type="hidden" name="return_q" value="{{ return_q|default:'' }}">

    <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Excluir cargo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
    </div>

    <div class="modal-body pt-2">
        <p class="mb-2">
            Tem certeza que deseja excluir o cargo
            <strong>{{ cargo.nome }}</strong>?
        </p>
        {% if cargo.total_funcionarios %}
            <p class="small text-warning mb-0">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Este cargo está vinculado a {{ cargo.total_funcionarios }} funcionário(s).
                Eles ficarão sem cargo definido após a exclusão.
            </p>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
        </button>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Excluir
        </button>
    </div>
</form>
