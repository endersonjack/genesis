{% extends 'base.html' %}

{% block title %}Recursos Humanos | Genesis ERP{% endblock %}

{% block content %}
<style>
    .rh-board-card {
        border: 1px solid #d9e2ec;
        border-radius: 1.25rem;
        background: #fff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
        overflow: hidden;
        height: 100%;
    }

    .rh-board-header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #e5edf5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
    }

    .rh-board-title {
        display: flex;
        align-items: center;
        gap: .75rem;
        font-weight: 800;
        font-size: 1.2rem;
        color: #0f172a;
        margin: 0;
    }

    .rh-board-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
            background: {{ request.empresa_ativa.cor_tema }};
        {% else %}
            background: #2563eb;
        {% endif %}
    }

    .rh-board-body {
        padding: 1.25rem;
        background: #f8fafc;
    }

    .mini-cards-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
    }

    @media (min-width: 1200px) {
        .mini-cards-grid {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }
    }

    .mini-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        padding: 1rem;
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .mini-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: .75rem;
        margin-bottom: .75rem;
    }

    .mini-card-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
    }

    .mini-card-icon.total {
        background: #dbeafe;
        color: #1d4ed8;
    }

    .mini-card-icon.ferias {
        background: #fef3c7;
        color: #b45309;
    }

    .mini-card-icon.experiencia {
        background: #fee2e2;
        color: #dc2626;
    }

    .mini-card-icon.aviso {
        background: #ffedd5;
        color: #ea580c;
    }

    .mini-card-value {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        color: #0f172a;
        margin-bottom: .35rem;
    }

    .mini-card-title {
        font-weight: 700;
        color: #0f172a;
        margin-bottom: .2rem;
    }

    .mini-card-desc {
        color: #64748b;
        font-size: .92rem;
        line-height: 1.45;
        flex-grow: 1;
    }

    .mini-card .btn {
        margin-top: .75rem;
        border-radius: .85rem;
        font-weight: 700;
    }


    /* CALENDÁRIO */
    .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: .9rem;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .calendar-title {
        font-size: 1rem;
        font-weight: 800;
        color: #0f172a;
        margin: 0;
        text-transform: none;
    }

    .calendar-wrap {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-weekday,
    .calendar-day {
        min-height: 96px;
        border-right: 1px solid #e5edf5;
        border-bottom: 1px solid #e5edf5;
        padding: .45rem;
        background: #fff;
    }

    .calendar-weekday {
        min-height: auto;
        font-weight: 800;
        color: #64748b;
        text-align: center;
        padding: .7rem .35rem;
        background: #f8fafc;
    }

    .calendar-grid > div:nth-child(7n) {
        border-right: none;
    }

    .calendar-day {
        cursor: pointer;
        transition: .2s ease;
    }

    .calendar-day:hover {
        background: #fff7ed;
    }

    .calendar-day.has-event {
        background: #fff3e6;
    }

    .calendar-day.has-event:hover {
        background: #ffe8cc;
    }

    .calendar-number {
        font-size: .95rem;
        font-weight: 800;
        color: #334155;
        margin-bottom: .35rem;
    }

    .calendar-day.today {
        box-shadow: inset 0 0 0 2px #2563eb;
    }

    .calendar-day.today .calendar-number {
        color: #2563eb;
    }

    .day-icons {
        display: flex;
        flex-wrap: wrap;
        gap: .3rem;
    }

    .day-icon {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: .8rem;
        font-weight: 800;
        border: 1px solid transparent;
    }

    .day-icon.ferias_inicio {
        background: #fef3c7;
        color: #b45309;
    }

    .day-icon.ferias_volta {
        background: #dcfce7;
        color: #15803d;
    }

    .day-icon.experiencia_45,
    .day-icon.fim_prorrogacao {
        background: #fee2e2;
        color: #dc2626;
    }

    .day-icon.fim_aviso {
        background: #ffedd5;
        color: #ea580c;
    }

    .day-icon.exame {
        background: #dbeafe;
        color: #1d4ed8;
    }

    .day-icon.aniversario {
        background: #ffedd5;
        color: #c2410c;
    }

    .calendar-empty {
        background: #fcfcfd;
        cursor: default;
    }

    .legend-list {
        display: flex;
        flex-wrap: wrap;
        gap: .75rem 1rem;
        margin-top: 1rem;
        margin-bottom: 1rem;
    }

    .legend-item {
        display: inline-flex;
        align-items: center;
        gap: .45rem;
        color: #334155;
        font-weight: 600;
    }

    .legend-dot {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: .8rem;
    }

    .legend-dot.ferias_inicio {
        background: #fef3c7;
        color: #b45309;
    }

    .legend-dot.ferias_volta {
        background: #dcfce7;
        color: #15803d;
    }

    .legend-dot.experiencia_45 {
        background: #fee2e2;
        color: #dc2626;
    }

    .legend-dot.fim_aviso {
        background: #ffedd5;
        color: #ea580c;
    }

    .legend-dot.exame {
        background: #dbeafe;
        color: #1d4ed8;
    }

    .legend-dot.aniversario {
        background: #ffedd5;
        color: #c2410c;
    }

    .calendar-actions {
        display: flex;
        gap: .75rem;
        flex-wrap: wrap;
    }

    .calendar-actions .btn {
        border-radius: .9rem;
        font-weight: 700;
        min-width: 180px;
    }

    .day-modal-list {
        display: flex;
        flex-direction: column;
        gap: .75rem;
    }

    .day-modal-item {
        border: 1px solid #e2e8f0;
        border-radius: .9rem;
        padding: .9rem 1rem;
        background: #fff;
    }

    .day-modal-item-title {
        font-weight: 800;
        color: #0f172a;
        margin-bottom: .2rem;
    }

    .day-modal-item-sub {
        color: #64748b;
        font-size: .92rem;
        margin-bottom: .75rem;
    }

     .day-modal-item-sub .legend-dot {
        width: 24px;
        height: 24px;
        flex: 0 0 24px;
    }

    @media (max-width: 767.98px) {
        .calendar-weekday,
        .calendar-day {
            min-height: 72px;
            padding: .35rem;
        }

        .calendar-number {
            font-size: .85rem;
        }

        .day-icon {
            width: 20px;
            height: 20px;
            font-size: .7rem;
        }

        .calendar-actions .btn {
            width: 100%;
        }
    }
    
.day-icon.lembrete,
.legend-dot.lembrete {
    background: #ffe4e6;
    color: #be123c;
}
.destaque-item-lembrete {
    border-left-color: #be123c;
}

.destaques-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.destaques-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 1rem;
    padding: 1rem;
    box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
}

.destaques-card-title {
    margin: 0 0 .8rem 0;
    font-weight: 800;
    color: #0f172a;
    font-size: 1rem;
}

.destaques-lista {
    display: flex;
    flex-direction: column;
    gap: .6rem;
}

.destaque-item {
    border: 1px solid #e2e8f0;
    border-left: 4px solid #2563eb;
    border-radius: .85rem;
    background: #f8fafc;
    padding: .65rem .8rem;
}

.destaque-item-link {
    text-decoration: none;
    color: inherit;
    display: block;
}

.destaque-item-link:hover .destaque-item {
    background: #eef2f7;
    border-color: #cbd5e1;
}

.destaque-item-meta {
    font-size: .82rem;
    color: #64748b;
    margin-bottom: .2rem;
    display: flex;
    align-items: center;
    gap: .4rem;
    flex-wrap: wrap;
}

.destaque-item-titulo {
    font-size: .92rem;
    color: #0f172a;
    font-weight: 700;
}

.destaque-item-sub {
    font-size: .84rem;
    color: #475569;
    margin-top: .2rem;
}

.destaque-item.ferias_inicio { border-left-color: #b45309; }
.destaque-item.ferias_volta { border-left-color: #15803d; }
.destaque-item.experiencia_45,
.destaque-item.fim_prorrogacao { border-left-color: #dc2626; }
.destaque-item.fim_aviso { border-left-color: #ea580c; }
.destaque-item.exame { border-left-color: #1d4ed8; }
.destaque-item.lembrete { border-left-color: #be123c; }
.destaque-item.aniversario { border-left-color: #c2410c; }

.destaque-vazio {
    color: #64748b;
    font-size: .92rem;
}

.destaques-dia-grupo {
    display: flex;
    flex-direction: column;
    gap: .5rem;
}

.destaques-dia-titulo {
    font-size: .86rem;
    font-weight: 800;
    color: #334155;
    padding: .35rem .55rem;
    background: #eef2f7;
    border: 1px solid #dbe4ee;
    border-radius: .7rem;
}

.avisos-data-header {
    font-size: .9rem;
    font-weight: 700;
    color: #475569;
}

.aniversariantes-card {
    margin-top: 1rem;
}

.aniversariantes-lista {
    display: flex;
    flex-direction: column;
    gap: .55rem;
}

.aniversariante-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    border: 1px solid #e2e8f0;
    border-radius: .85rem;
    background: #f8fafc;
    padding: .6rem .8rem;
}

.aniversariante-main {
    display: flex;
    align-items: center;
    gap: .65rem;
}

.aniversariante-icon {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #ffedd5;
    color: #c2410c;
    flex: 0 0 34px;
}

.destaque-item-link:hover .aniversariante-item {
    background: #eef2f7;
    border-color: #cbd5e1;
}

.aniversariante-info {
    color: #0f172a;
    font-weight: 700;
}

.aniversariante-cargo {
    color: #64748b;
    font-size: .84rem;
    font-weight: 600;
}

.aniversariante-dia {
    color: #64748b;
    font-size: .84rem;
    font-weight: 600;
}

.avisos-view-switch {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
}

.avisos-view-switch .btn {
    border-radius: .85rem;
    font-weight: 700;
}

.avisos-view-switch .btn.active {
    color: #fff;
    border-color: transparent;
    {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
        background: {{ request.empresa_ativa.cor_tema }};
    {% else %}
        background: #2563eb;
    {% endif %}
}

.destaques-view {
    width: 100%;
}


.rh-top-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: .75rem;
    flex-wrap: wrap;
}

.rh-top-btn {
    border: none;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .55rem;
    min-height: 46px;
    padding: .78rem 1.1rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: .95rem;
    line-height: 1;
    transition: all .2s ease;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
}

.rh-top-btn i {
    font-size: 1rem;
    line-height: 1;
}

.rh-top-btn-light {
    background: #fff;
    color: #0f172a;
    border: 1px solid #dbe4ee;
}

.rh-top-btn-light:hover {
    background: #f8fafc;
    color: #0f172a;
    border-color: #cbd5e1;
    transform: translateY(-1px);
}

.rh-top-btn-primary {
    color: #fff;
    border: 1px solid transparent;
    {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
        background: {{ request.empresa_ativa.cor_tema }};
    {% else %}
        background: #2563eb;
    {% endif %}
}

.rh-top-btn-primary:hover {
    color: #fff;
    filter: brightness(0.96);
    transform: translateY(-1px);
}

.rh-top-btn:focus {
    outline: none;
    box-shadow: 0 0 0 .2rem rgba(37, 99, 235, 0.15);
}

.rh-top-btn-icon-only {
    min-width: 46px;
    padding-left: .85rem;
    padding-right: .85rem;
}

.rh-top-more-dropdown .dropdown-toggle::after {
    display: none;
}

@media (max-width: 767.98px) {
    .rh-top-actions {
        width: 100%;
        justify-content: stretch;
    }

    .rh-top-btn {
        flex: 1 1 100%;
        width: 100%;
    }

    .destaques-grid {
        grid-template-columns: 1fr;
    }
}

@keyframes dashboardSk {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.dashboard-hx-skeleton {
    background: linear-gradient(90deg, #f1f5f9 0%, #e8eef5 45%, #f1f5f9 100%);
    background-size: 200% 100%;
    animation: dashboardSk 1.15s ease-in-out infinite;
    border-radius: .65rem;
}

.dashboard-hx-skeleton-line {
    height: .85rem;
    margin-bottom: .5rem;
}

.dashboard-hx-skeleton-line.short { width: 55%; }
.dashboard-hx-skeleton-line.tiny { width: 35%; height: .65rem; }

.dashboard-hx-skeleton-card {
    min-height: 118px;
    border-radius: 1rem;
    border: 1px solid #e2e8f0;
    padding: 1rem;
    background: #fff;
}

.dashboard-hx-skeleton-title {
    height: 1.75rem;
    width: 40%;
    margin-bottom: .75rem;
    border-radius: .5rem;
}

.dashboard-hx-skeleton-block {
    height: 140px;
    border-radius: 1rem;
    margin-top: 1rem;
}

    /* Hero Gestão de RH — único card com barra lateral + sombra destacada */
    .rh-gestao-hero-shell {
        border: 1px solid #d9e2ec;
        border-radius: 1.25rem;
        background: linear-gradient(135deg, #ffffff 0%, #f8fafc 55%, #f1f5f9 100%);
        overflow: hidden;
        position: relative;
        box-shadow:
            inset 6px 0 0 0 {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}{{ request.empresa_ativa.cor_tema }}{% else %}#2563eb{% endif %},
            0 14px 36px rgba(15, 23, 42, 0.07);
    }
    .rh-gestao-hero-inner {
        position: relative;
        z-index: 1;
    }
    .rh-gestao-hero-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.65rem;
        color: #fff;
        {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
            background: {{ request.empresa_ativa.cor_tema }};
        {% else %}
            background: #2563eb;
        {% endif %}
        box-shadow: 0 8px 22px rgba(37, 99, 235, 0.25);
    }
    .rh-gestao-hero-eyebrow {
        font-size: .72rem;
        font-weight: 800;
        letter-spacing: .06em;
        text-transform: uppercase;
        color: #64748b;
    }
    .rh-gestao-hero-title {
        font-size: 1.45rem;
        font-weight: 800;
        color: #0f172a;
        margin: 0;
        line-height: 1.2;
    }
    .rh-gestao-hero-lead {
        font-size: .98rem;
        line-height: 1.55;
        max-width: 42rem;
    }
    .rh-gestao-hero-cta {
        min-width: min(100%, 280px);
    }
    .rh-gestao-hero .btn-primary {
        {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
            background: {{ request.empresa_ativa.cor_tema }};
            border-color: {{ request.empresa_ativa.cor_tema }};
        {% endif %}
    }
    .rh-gestao-hero .btn-primary:hover {
        filter: brightness(0.96);
    }

</style>

<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <div>
        <h2 class="fw-bold mb-1">Recursos Humanos</h2>
        <p class="text-muted mb-0">Visão geral da empresa selecionada.</p>
    </div>

    <div class="rh-top-actions">
        <a href="{% url 'rh:buscar_funcionarios' empresa_id=request.empresa_ativa.pk %}"
           class="rh-top-btn rh-top-btn-light">
            <i class="bi bi-search"></i>
            <span>Buscar</span>
        </a>
        <a href="{% url 'rh:locais_trabalho_mapa' empresa_id=request.empresa_ativa.pk %}"
           class="rh-top-btn rh-top-btn-light">
            <i class="bi bi-map"></i>
            <span>Ver Mapa de Locais de Trabalho</span>
        </a>
        <a href="{% url 'rh:locais_trabalho' empresa_id=request.empresa_ativa.pk %}"
           class="rh-top-btn rh-top-btn-light">
            <i class="bi bi-geo-alt"></i>
            <span>Locais de Trabalho</span>
        </a>

        <div class="d-inline-flex align-items-stretch gap-2 flex-wrap rh-top-novo-wrap">
            <button
                type="button"
                class="rh-top-btn rh-top-btn-primary"
                hx-get="{% url 'rh:modal_novo_funcionario_rapido' empresa_id=request.empresa_ativa.pk %}"
                hx-target="#modal-content"
                hx-swap="innerHTML"
                data-no-global-loading
                data-bs-toggle="modal"
                data-bs-target="#modalPadrao">
                <i class="bi bi-person-plus"></i>
                <span>Novo funcionário</span>
            </button>

            <div class="dropdown rh-top-more-dropdown" data-bs-popper="static">
                <button
                    type="button"
                    class="rh-top-btn rh-top-btn-light rh-top-btn-icon-only dropdown-toggle"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                    aria-label="Mais ações">
                    <i class="bi bi-three-dots-vertical"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                    <li>
                        <a class="dropdown-item d-flex align-items-center gap-2"
                            href="{% url 'rh:lista_cargos' empresa_id=request.empresa_ativa.pk %}">
                            <i class="bi bi-briefcase"></i>
                            Cargos
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="rh-gestao-hero-shell mb-4 p-3 p-md-4">
    <div
        id="dashboard-slot-gestao-rh"
        data-no-global-loading
        hx-get="{% url 'rh:dashboard_partial_gestao_rh' empresa_id=request.empresa_ativa.pk %}"
        hx-trigger="load"
        hx-swap="innerHTML"
        hx-on="htmx:afterSwap: this.removeAttribute('aria-busy')"
        role="region"
        aria-busy="true"
        aria-label="Carregando bloco Gestão de RH">
        <div class="rh-gestao-hero-skeleton" aria-hidden="true">
            <div class="row align-items-center g-4">
                <div class="col-lg-7">
                    <div class="d-flex flex-column flex-sm-row align-items-start gap-3">
                        <div class="dashboard-hx-skeleton flex-shrink-0" style="width:56px;height:56px;border-radius:16px;"></div>
                        <div class="flex-grow-1 w-100" style="min-width:0;">
                            <div class="dashboard-hx-skeleton dashboard-hx-skeleton-line mb-3" style="width:28%;height:.65rem;border-radius:.35rem;"></div>
                            <div class="dashboard-hx-skeleton dashboard-hx-skeleton-line mb-3" style="width:52%;height:1.35rem;border-radius:.5rem;"></div>
                            <div class="dashboard-hx-skeleton dashboard-hx-skeleton-line mb-2"></div>
                            <div class="dashboard-hx-skeleton dashboard-hx-skeleton-line short mb-3"></div>
                            <div class="dashboard-hx-skeleton" style="width:150px;height:2rem;border-radius:999px;"></div>
                        </div>
                    </div>
                </div>

<script>
document.body.addEventListener("click", function (e) {
    const button = e.target.closest(".avisos-view-switch [data-view-target]");
    if (!button) return;

    const switcher = button.closest(".avisos-view-switch");
    if (!switcher) return;

    const target = button.getAttribute("data-view-target");
    const buttons = switcher.querySelectorAll("[data-view-target]");
    const viewDia = document.getElementById("avisos-view-dia");
    const viewSemana = document.getElementById("avisos-view-semana");
    if (!viewDia || !viewSemana) return;

    buttons.forEach((b) => b.classList.remove("active"));
    button.classList.add("active");

    if (target === "dia") {
        viewDia.classList.remove("d-none");
        viewSemana.classList.add("d-none");
    } else {
        viewSemana.classList.remove("d-none");
        viewDia.classList.add("d-none");
    }
});
</script>
