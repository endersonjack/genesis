{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Genesis ERP</title>
<meta name="theme-color" content="#0d6efd">
<link rel="manifest" href="{% url 'web_app_manifest' %}">
{% if brand_favicon %}
<link rel="icon" href="{% static brand_favicon.path %}"{% if brand_favicon.type %} type="{{ brand_favicon.type }}"{% endif %}>
{% endif %}
{% if brand_apple_touch_path %}
<link rel="apple-touch-icon" href="{% static brand_apple_touch_path %}">
{% endif %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/login.css' %}">

</head>

<body class="login-page">

<div class="card login-card p-4">

    <div class="text-center mb-3">

        <img src="{% static brand_main_logo_static %}" class="login-logo" alt="Genesis ERP" width="120" height="120" decoding="async">

        <h4 class="login-title">Genesis ERP</h4>

        <p class="text-muted small">
            Sistema de Gestão Empresarial
        </p>

    </div>

    {% if form.errors %}
    <div class="alert alert-danger">
        Usuário ou senha inválidos.
    </div>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   required
                   autofocus>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <button class="btn btn-primary w-100 login-btn">
            Entrar
        </button>

    </form>

    <div class="text-center mt-3 login-footer">
        Genesis ERP © {% now "Y" %}
    </div>

</div>

</body>
</html>
