<div class="modal-header">
    <h5 class="modal-title fw-bold">Excluir lista de compra</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form method="post"
      class="js-estoque-form-busy"
      data-estoque-busy-label="Excluindo…"
      hx-post="{{ excluir_url }}"
      hx-target="#modal-content"
      hx-swap="innerHTML"
      data-no-global-loading>
    {% csrf_token %}

    <div class="modal-body">
        <p class="text-muted mb-0">
            Confirma a exclusão da lista do pedido em
            <strong>{{ lista.data_pedido|date:'d/m/Y' }}</strong>
            ({{ lista.get_status_display }})?
        </p>
    </div>

    <div class="modal-footer d-flex flex-wrap align-items-center gap-2 justify-content-end">
        <button type="button" class="estoque-btn estoque-btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="estoque-btn estoque-btn-danger">
            <i class="bi bi-trash me-1"></i> Excluir
        </button>
    </div>
</form>
