{% extends 'base.html' %}

{% block title %}{{ page_title }} | Estoque | Genesis ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
                <h2 class="h5 fw-bold mb-3">{{ page_title }}</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="{{ form.nome.id_for_label }}">{{ form.nome.label }}</label>
                        {{ form.nome }}
                        {% if form.nome.errors %}<div class="text-danger small mt-1">{{ form.nome.errors }}</div>{% endif %}
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-primary rounded-3">Salvar</button>
                        <a href="{% url 'estoque:lista_categorias_ferramentas' empresa_id=request.empresa_ativa.pk %}" class="btn btn-outline-secondary rounded-3">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
