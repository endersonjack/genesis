<div class="estoque-board-card mb-4">
    <div class="estoque-board-body">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-start gap-3">
                <div style="width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#475569,#334155);">
                    <i class="bi bi-wrench-adjustable" style="font-size:1.65rem;"></i>
                </div>
                <div>
                    <p class="text-uppercase small fw-bold text-muted mb-1" style="letter-spacing:.06em;">Ferramentas</p>
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                        <h3 class="fw-bold mb-0" style="color:#0f172a;">Cautela de Ferramentas</h3>
                        {% if tem_cautelas_vencidas %}
                        <span class="badge rounded-pill bg-warning text-dark d-inline-flex align-items-center gap-2 px-3 py-2 fw-semibold fs-6">
                            <i class="bi bi-exclamation-triangle-fill fs-5" aria-hidden="true"></i>
                            Há cautelas com previsão vencida
                        </span>
                        {% endif %}
                    </div>
                    <p class="text-muted mb-0" style="max-width:42rem;">
                        Registro de entrega e devolução de ferramentas para colaboradores e obras.
                    </p>
                </div>
            </div>
            <a href="{% url 'estoque:cautela_ferramentas' empresa_id=request.empresa_ativa.pk %}"
               class="btn btn-lg estoque-board-req-btn rounded-3 fw-semibold px-4"
               style="min-width:min(100%,280px);">
                Ver Cautelas
                <i class="bi bi-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</div>
