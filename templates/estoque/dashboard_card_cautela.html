<div class="estoque-board-card mb-4">
    <div class="estoque-board-body d-flex flex-column h-100">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 flex-grow-1">
            <div class="d-flex align-items-start gap-3 flex-grow-1 min-w-0">
                <div class="flex-shrink-0 d-flex align-items-center justify-content-center text-white"
                     style="width:56px;height:56px;border-radius:16px;background:var(--estoque-cor-requisicoes);">
                    <i class="bi bi-wrench-adjustable" style="font-size:1.65rem;" aria-hidden="true"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-uppercase small fw-bold text-muted mb-1" style="letter-spacing:.06em;">Ferramentas</p>
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                        <h3 class="fw-bold mb-0" style="color:#0f172a;">Cautela de Ferramentas</h3>
                        {% if tem_cautelas_vencidas %}
                        <span class="badge rounded-pill bg-warning text-dark d-inline-flex align-items-center gap-2 px-3 py-2 fw-semibold fs-6">
                            <i class="bi bi-exclamation-triangle-fill fs-5" aria-hidden="true"></i>
                            Há cautelas com previsão vencida
                        </span>
                        {% endif %}
                    </div>
                    <p class="text-muted mb-0 small" style="max-width:28rem;">
                        Registro de entrega e devolução de ferramentas para colaboradores e obras.
                    </p>
                </div>
            </div>
            <div class="d-flex flex-column flex-shrink-0 align-self-start gap-2"
                 style="min-width:min(100%,280px);">
                <a href="{% url 'estoque:cautela_ferramentas' empresa_id=request.empresa_ativa.pk %}"
                   class="btn btn-lg estoque-board-req-btn rounded-3 fw-bold px-4 py-2 text-white text-decoration-none d-inline-flex align-items-center justify-content-center">
                    Acessar&nbsp;→
                </a>
                <a href="{% url 'estoque:cautela_nova' empresa_id=request.empresa_ativa.pk %}"
                   class="btn btn-lg rounded-3 fw-bold px-3 py-2 text-decoration-none d-inline-flex align-items-center justify-content-center"
                   style="border-width:2px;border-style:solid;border-color:var(--estoque-cor-requisicoes);color:var(--estoque-cor-requisicoes);background:transparent;">
                    <i class="bi bi-plus-lg me-1"></i> Nova cautela
                </a>
            </div>
        </div>
    </div>
</div>
