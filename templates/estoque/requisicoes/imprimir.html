<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Requisição #{{ requisicao.pk }} — Impressão</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @page {
            margin: 12mm 15mm;
        }
        @media print {
            .no-print { display: none !important; }
            /* Duas vias na mesma página se couber; senão a2ª via inteira na página seguinte. */
            .via {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .via:not(:last-child) {
                break-after: auto;
                page-break-after: auto;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 9pt;
            line-height: 1.22;
            margin: 0;
            color: #0f172a;
            background: #fff;
        }
        .toolbar {
            border-bottom: 1px solid #e2e8f0;
            padding: .5rem .75rem;
            display: flex;
            gap: .5rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .btn {
            font: inherit;
            padding: .35rem .75rem;
            border-radius: .35rem;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
        .btn-outline { background: #fff; border-color: #2563eb; color: #2563eb; }
        .req-via { padding: 3mm 15mm 0; max-width: 210mm; margin: 0 auto; }
        .via:not(:last-child) {
            margin-bottom: 0;
        }
        @media print {
            .req-via {
                padding: 0;
                max-width: none;
                margin-left: 0;
                margin-right: 0;
                margin-top: 0;
            }
        }
        .req-pdf-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 4mm;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 3mm;
            margin-bottom: 3mm;
        }
        .req-pdf-top-left {
            flex: 1;
            min-width: 0;
        }
        .req-pdf-top-right {
            flex-shrink: 0;
            text-align: right;
            max-width: 42%;
        }
        .req-pdf-empresa-header {
            display: flex;
            gap: 3mm;
            align-items: center;
        }
        .req-pdf-empresa-logo {
            flex-shrink: 0;
        }
        .req-pdf-empresa-logo img {
            display: block;
            max-height: 24mm;
            max-width: 34mm;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .req-pdf-empresa-text { min-width: 0; flex: 1; }
        .req-pdf-nome {
            font-size: 9pt;
            font-weight: 700;
            line-height: 1.2;
        }
        .req-pdf-razao {
            font-size: 8pt;
            color: #64748b;
            line-height: 1.2;
            margin-top: 1px;
        }
        .req-pdf-meta-line {
            font-size: 9pt;
            color: #0f172a;
            line-height: 1.22;
            margin-top: 1mm;
        }
        .req-pdf-nome + .req-pdf-meta-line,
        .req-pdf-razao + .req-pdf-meta-line {
            margin-top: 2mm;
        }
        .req-pdf-top-right .req-via-label {
            font-size: 8pt;
            line-height: 1.25;
            color: #64748b;
            letter-spacing: 0.06em;
            margin: 0 0 1mm;
        }
        .req-pdf-top-right .req-doc-title {
            font-size: 13pt;
            font-weight: 700;
            line-height: 1.23;
            margin: 0 0 1mm;
        }
        .req-pdf-top-right .req-doc-meta {
            font-size: 9pt;
            color: #475569;
            line-height: 1.33;
            margin: 0;
        }
        .req-pdf-top-right .req-cancelada {
            margin-top: 2mm;
            font-weight: 600;
            font-size: 9pt;
            color: #842029;
        }
        .req-meta-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 5mm;
        }
        .req-meta-table td {
            vertical-align: top;
            padding: 0 0 3pt;
            border: none;
            font-size: 9pt;
        }
        .req-meta-table .lab {
            width: 14%;
            font-size: 7pt;
            line-height: 1.29;
            color: #64748b;
            text-transform: uppercase;
            padding-right: 2mm;
            white-space: nowrap;
        }
        .req-meta-table .val {
            width: 36%;
            font-weight: 700;
            line-height: 1.22;
        }
        .req-meta-table .val-span { width: auto; }
        .req-items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9pt;
            table-layout: fixed;
        }
        .req-col-item { width: 62%; }
        .req-col-qtd { width: 25%; }
        .req-col-un { width: 13%; }
        .req-items-table th,
        .req-items-table td {
            border: 1px solid #e2e8f0;
            padding: 4pt;
            vertical-align: top;
            line-height: 1.22;
        }
        .req-items-table thead th {
            background: #f1f5f9;
            font-weight: 700;
            text-align: left;
        }
        .req-items-table thead th:nth-child(2),
        .req-items-table thead th:nth-child(3) {
            text-align: center;
        }
        .req-items-table .num,
        .req-items-table .un { text-align: center; }
        .req-items-table .req-empty { color: #64748b; }
        .req-assin-row {
            display: flex;
            align-items: flex-start;
            margin-top: 10mm;
            gap: 12mm;
        }
        .req-assin {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            padding-top: 8pt;
            gap: 4pt;
        }
        .req-assin-line {
            height: 0;
            border-top: 1px solid #0f172a;
            width: 100%;
            max-width: 100%;
        }
        .req-assin-line--esq { align-self: flex-start; }
        .req-assin-line--dir { align-self: flex-end; }
        .req-assin-dir .req-assin-cap { text-align: right; }
        .req-assin-cap {
            font-size: 8pt;
            color: #64748b;
            margin: 0;
        }
        .req-linha-corte {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8mm auto;
            max-width: 210mm;
            padding: 0 15mm;
            color: #64748b;
            font-size: 8pt;
            user-select: none;
        }
        @media print {
            .req-linha-corte {
                padding: 0;
                max-width: none;
                margin: 6mm 0;
            }
        }
        .req-linha-corte-traco {
            flex: 1;
            min-width: 12px;
            border: 0;
            border-top: 1px dashed #94a3b8;
            height: 0;
        }
        .req-linha-corte-texto {
            flex-shrink: 0;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
<div class="no-print toolbar">
    <button type="button" class="btn btn-primary" onclick="window.print()">Imprimir</button>
    <a href="{% url 'estoque:imprimir_requisicao_pdf' empresa_id=request.empresa_ativa.pk pk=requisicao.pk %}"
       class="btn btn-outline"
       target="_blank"
       rel="noopener noreferrer">Gerar PDF</a>
    <button type="button" class="btn" onclick="window.close()">Fechar</button>
</div>

{% include 'estoque/requisicoes/_imprimir_via.html' with via_label='Via do almoxarife' %}
{% include 'estoque/requisicoes/_imprimir_linha_corte.html' %}
{% include 'estoque/requisicoes/_imprimir_via.html' with via_label='Via do solicitante' %}

<script>
(function () {
  function abrirDialogoImpressao() {
    window.print();
  }
  function agendar() {
    requestAnimationFrame(function () {
      setTimeout(abrirDialogoImpressao, 150);
    });
  }
  if (document.readyState === 'complete') {
    agendar();
  } else {
    window.addEventListener('load', agendar, { once: true });
  }
})();
</script>
</body>
</html>
