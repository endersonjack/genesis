<div class="mt-2 ac-suggestions-root">
    {% if hint %}
        <p class="text-muted small mb-0 px-2 py-2 bg-light rounded border">{{ hint }}</p>
    {% elif not items %}
        <p class="text-muted small mb-0 px-2 py-2 bg-light rounded border">Nenhum resultado.</p>
    {% else %}
        <div class="list-group busca-rapida-lista" role="listbox">
            {% for it in items %}
                <button type="button"
                        class="list-group-item list-group-item-action d-flex align-items-center gap-2 w-100 js-ac-item text-start"
                        data-id="{{ it.pk }}"
                        data-label="{{ it }}">
                    <span class="fw-semibold text-truncate flex-grow-1 min-w-0">{{ it }}</span>
                    <span class="text-muted small flex-shrink-0 text-nowrap">Selecionar</span>
                </button>
            {% endfor %}
        </div>
    {% endif %}
</div>
