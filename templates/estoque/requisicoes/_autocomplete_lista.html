<div class="mt-2">
    {% if hint %}
        <p class="text-muted small mb-0 px-2 py-2 bg-light rounded border">{{ hint }}</p>
    {% elif not items %}
        <p class="text-muted small mb-0 px-2 py-2 bg-light rounded border">Nenhum resultado.</p>
    {% else %}
        <div class="list-group busca-rapida-lista" role="listbox">
            {% for it in items %}
                <button type="button"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center js-ac-item"
                        data-id="{{ it.pk }}"
                        data-label="{{ it }}">
                    <span class="fw-semibold">{{ it }}</span>
                    <span class="text-muted small">Selecionar</span>
                </button>
            {% endfor %}
        </div>
    {% endif %}
</div>
