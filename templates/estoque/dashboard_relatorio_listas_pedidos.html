<div class="row g-3 mb-4">
    <div class="col-12 col-lg-6">
        <div class="estoque-board-card h-100 mb-0">
            <div class="estoque-board-body d-flex flex-column h-100">
                <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 flex-grow-1">
                    <div class="d-flex align-items-start gap-3 flex-grow-1 min-w-0">
                        <div class="flex-shrink-0 d-flex align-items-center justify-content-center text-white"
                             style="width:56px;height:56px;border-radius:16px;background:var(--estoque-cor-requisicoes);">
                            <i class="bi bi-clipboard-data" style="font-size:1.65rem;" aria-hidden="true"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="text-uppercase small fw-bold text-muted mb-1" style="letter-spacing:.06em;">Operação</p>
                            <h3 class="fw-bold mb-1" style="color:#0f172a;">Relatório</h3>
                            <p class="text-muted mb-0 small" style="max-width:28rem;">
                                Relatórios por funcionário, ferramentas, entradas e saídas de itens, e auditoria de movimentar e cautelas.
                            </p>
                        </div>
                    </div>
                    <a href="{% url 'estoque:relatorios_estoque' empresa_id=request.empresa_ativa.pk %}"
                       class="btn btn-lg estoque-board-req-btn rounded-3 fw-bold px-4 py-2 flex-shrink-0 align-self-start text-white text-decoration-none d-inline-flex align-items-center justify-content-center"
                       style="min-width:min(100%,200px);border-radius:12px;">
                        Acessar&nbsp;→
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-6">
        <div class="estoque-board-card h-100 mb-0">
            <div class="estoque-board-body d-flex flex-column h-100">
                <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 flex-grow-1">
                    <div class="d-flex align-items-start gap-3 flex-grow-1 min-w-0">
                        <div class="flex-shrink-0 d-flex align-items-center justify-content-center text-white"
                             style="width:56px;height:56px;border-radius:16px;background:var(--estoque-cor-requisicoes);">
                            <i class="bi bi-list-task" style="font-size:1.65rem;" aria-hidden="true"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="text-uppercase small fw-bold text-muted mb-1" style="letter-spacing:.06em;">Solicitações</p>
                            <h3 class="fw-bold mb-1" style="color:#0f172a;">Listas/Pedidos</h3>
                            <p class="text-muted mb-0 small" style="max-width:28rem;">
                                Listas de requisições, novos pedidos de retirada e acompanhamento de entregas.
                            </p>
                        </div>
                    </div>
                    <a href="{% url 'estoque:requisicoes' empresa_id=request.empresa_ativa.pk %}"
                       class="btn btn-lg estoque-board-req-btn rounded-3 fw-bold px-4 py-2 flex-shrink-0 align-self-start text-white text-decoration-none d-inline-flex align-items-center justify-content-center"
                       style="min-width:min(100%,200px);border-radius:12px;">
                        Acessar&nbsp;→
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
