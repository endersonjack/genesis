{# Layout alinhado aos cards Requisições, Cautela e Atenção (ícone + textos + CTA / tabela). #}
<div class="estoque-board-card mb-4 estoque-dash-card-skeleton" aria-hidden="true">
    <div class="estoque-board-body">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-start gap-3 flex-grow-1 min-w-0">
                <div class="estoque-hx-skeleton flex-shrink-0" style="width:56px;height:56px;border-radius:16px;"></div>
                <div class="flex-grow-1 min-w-0" style="max-width:42rem;">
                    <div class="estoque-hx-skeleton mb-2" style="height:0.65rem;width:7rem;border-radius:0.35rem;"></div>
                    <div class="estoque-hx-skeleton mb-2" style="height:1.35rem;width:55%;max-width:14rem;border-radius:0.35rem;"></div>
                    <div class="estoque-hx-skeleton mb-1" style="height:0.85rem;width:100%;border-radius:0.35rem;"></div>
                    <div class="estoque-hx-skeleton" style="height:0.85rem;width:88%;border-radius:0.35rem;"></div>
                </div>
            </div>
            <div class="estoque-hx-skeleton flex-shrink-0" style="width:min(100%,280px);height:3rem;border-radius:999px;"></div>
        </div>
    </div>
</div>
<div class="estoque-board-card mb-4 estoque-dash-card-skeleton" aria-hidden="true">
    <div class="estoque-board-body">

                    <div class="estoque-hx-skeleton mb-1" style="height:0.85rem;width:100%;border-radius:0.35rem;"></div>

<div class="estoque-board-card mb-4 estoque-dash-card-skeleton" aria-hidden="true">
    <div class="estoque-board-body">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-3">
            <div class="d-flex align-items-start gap-3 flex-grow-1 min-w-0">
                <div class="estoque-hx-skeleton flex-shrink-0" style="width:56px;height:56px;border-radius:16px;"></div>
                <div class="flex-grow-1 min-w-0" style="max-width:42rem;">
                    <div class="estoque-hx-skeleton mb-2" style="height:0.65rem;width:5rem;border-radius:0.35rem;"></div>
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                        <div class="estoque-hx-skeleton" style="height:1.35rem;width:6rem;border-radius:0.35rem;"></div>
                        <div class="estoque-hx-skeleton" style="height:2rem;width:14rem;border-radius:999px;"></div>
                    </div>
                    <div class="estoque-hx-skeleton mb-1" style="height:0.75rem;width:100%;border-radius:0.35rem;"></div>
                    <div class="estoque-hx-skeleton" style="height:0.75rem;width:90%;border-radius:0.35rem;"></div>
                </div>
            </div>
            <div class="estoque-hx-skeleton flex-shrink-0" style="width:min(100%,260px);height:3rem;border-radius:0.75rem;"></div>
        </div>
        <div class="estoque-dash-estoque-scroll p-2 bg-white rounded-3">
            {% for _ in "12345" %}
            <div class="d-flex align-items-center gap-2 py-2 {% if not forloop.last %}border-bottom border-light{% endif %}">
                <div class="estoque-hx-skeleton flex-shrink-0" style="width:44px;height:44px;border-radius:0.5rem;"></div>
                <div class="flex-grow-1 min-w-0">
                    <div class="estoque-hx-skeleton mb-1" style="height:0.8rem;width:70%;border-radius:0.35rem;"></div>
                    <div class="estoque-hx-skeleton" style="height:0.65rem;width:40%;border-radius:0.35rem;"></div>
                </div>
                <div class="estoque-hx-skeleton flex-shrink-0" style="height:1.75rem;width:4.5rem;border-radius:0.5rem;"></div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
