<form
    method="post"
    hx-post="{{ post_url }}"
    hx-target="#modal-content"
    hx-swap="innerHTML"
    data-no-global-loading>
    {% csrf_token %}

    <div class="modal-header">
        <h5 class="modal-title fw-bold mb-0">{{ titulo_modal }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
    </div>

    <div class="modal-body">
        <label class="form-label fw-semibold" for="{{ form.nome.id_for_label }}">{{ form.nome.label }}</label>
        {{ form.nome }}
        {% if form.nome.errors %}
            <div class="text-danger small mt-1">{{ form.nome.errors|join:", " }}</div>
        {% endif %}
        {% if form.non_field_errors %}
            <div class="alert alert-danger mt-3 mb-0">{{ form.non_field_errors }}</div>
        {% endif %}
    </div>

    <div class="modal-footer d-flex flex-wrap align-items-center gap-2 justify-content-between">
        <div class="d-flex flex-wrap gap-2">
            {% if excluir_url %}
            <button type="button"
                    class="estoque-btn estoque-btn-danger-outline js-estoque-modal-hx"
                    hx-get="{{ excluir_url }}"
                    hx-target="#modal-content"
                    hx-swap="innerHTML"
                    data-no-global-loading>
                <i class="bi bi-trash me-1"></i> Excluir
            </button>
            {% endif %}
        </div>
        <div class="d-flex flex-wrap gap-2">
            <button type="button" class="estoque-btn estoque-btn-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="estoque-btn estoque-btn-primary">
                <i class="bi bi-check2-circle me-1"></i> Salvar
            </button>
        </div>
    </div>
</form>
