<script>
(function () {
    'use strict';
    try {
        var params = new URLSearchParams(window.location.search || '');
        var raw = params.get('edit_item');
        if (!raw) return;
        var itemId = parseInt(raw, 10);
        if (!Number.isFinite(itemId) || itemId <= 0) return;

        var sample = "{% url 'estoque:detalhes_item' empresa_id=request.empresa_ativa.pk pk=1 %}";
        var url = sample.replace(/\/itens\/\d+\/?$/, '/itens/' + itemId + '/');
        params.delete('edit_item');
        var qs = params.toString();
        if (qs) {
            url += (url.indexOf('?') >= 0 ? '&' : '?') + qs;
        }
        window.location.replace(url);
    } catch (e) {
        /* silencioso */
    }
})();
</script>
