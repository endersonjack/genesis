{% if muito_curto %}
  <p class="text-muted small mb-0 px-2 py-2 bg-light rounded border">
    Digite pelo menos <strong>2 caracteres</strong> para buscar.
  </p>
{% else %}
  {% if resultados %}
    <div class="list-group">
      {% for f in resultados %}
        <button type="button"
                class="list-group-item list-group-item-action text-start apont-pick"
                data-apont-fid="{{ f.pk }}"
                data-apont-nome="{{ f.nome }}">
          <div class="fw-semibold">{{ f.nome }}</div>
          <div class="text-muted small">
            CPF: {{ f.cpf|default:"—" }}
            {% if f.matricula %} • Matrícula: {{ f.matricula }}{% endif %}
          </div>
          <div class="text-muted small">
            {{ f.cargo|default:"—" }}{% if f.lotacao %} • {{ f.lotacao }}{% endif %}
          </div>
        </button>
      {% endfor %}
    </div>
  {% else %}
    <p class="text-muted small mb-0 px-2 py-2 bg-light rounded border">
      Nenhum funcionário encontrado para <strong>{{ q }}</strong>.
    </p>
  {% endif %}
{% endif %}
