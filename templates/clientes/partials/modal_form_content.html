<div class="modal-content rounded-3 border-0 shadow">
    <form method="post"
          action="{{ post_url }}"
          hx-post="{{ post_url }}"
          hx-target="#clienteModalSwapTarget"
          hx-swap="innerHTML"
          novalidate>
        {% csrf_token %}
        <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="clienteModalLabel">{{ titulo_modal }}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body pt-2">
            {% include 'clientes/partials/_cliente_campos.html' %}
        </div>
        <div class="modal-footer border-0 pt-0 d-flex flex-wrap align-items-center gap-2">
            {% if cliente_edicao %}
                <button type="button"
                        class="btn btn-outline-danger rounded-3 me-auto"
                        hx-get="{% url 'clientes:modal_excluir_confirm' empresa_id=request.empresa_ativa.pk pk=cliente_edicao.pk %}"
                        hx-target="#clienteModalSwapTarget"
                        hx-swap="innerHTML">
                    Excluir
                </button>
                <button type="button"
                        class="btn btn-outline-success rounded-3"
                        hx-get="{% url 'clientes:modal_copiar' empresa_id=request.empresa_ativa.pk pk=cliente_edicao.pk %}"
                        hx-target="#copiarCadastroModalInner"
                        hx-swap="innerHTML">
                    <i class="bi bi-copy me-1"></i> Copiar para outra empresa
                </button>
            {% endif %}
            <div class="d-flex flex-wrap gap-2 ms-auto">
                <button type="button" class="btn btn-outline-secondary rounded-3" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary rounded-3 px-4">Salvar</button>
            </div>
        </div>
    </form>
</div>
