<style>
    .financeiro-modal-btn {
        border: none;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: .55rem;
        min-height: 42px;
        padding: .68rem 1rem;
        border-radius: 999px;
        font-weight: 700;
        line-height: 1;
        transition: all .2s ease;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }
    .financeiro-modal-btn-light {
        background: #fff;
        color: #0f172a;
        border: 1px solid #dbe4ee;
    }
    .financeiro-modal-btn-primary {
        color: #fff;
        border: 1px solid transparent;
        {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}
            background: {{ request.empresa_ativa.cor_tema }};
        {% else %}
            background: #2563eb;
        {% endif %}
    }
</style>

<div class="modal-header">
    <div>
        <h5 class="modal-title fw-bold mb-1">{{ modal_title }}</h5>
        <div class="text-muted small">{{ modal_subtitle }}</div>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form method="post"
      hx-post="{{ post_url }}"
      hx-target="#modal-content"
      hx-swap="innerHTML"
      data-no-global-loading
      novalidate>
    {% csrf_token %}
    <div class="modal-body">
        {% if form.non_field_errors %}
        <div class="alert alert-danger rounded-4">{{ form.non_field_errors }}</div>
        {% endif %}
        <div class="row g-3">
            {% for field in form %}
            <div class="col-12 {% if field.name == 'observacao' %}col-lg-12{% elif field.name == 'ativo' %}col-lg-12{% else %}col-lg-6{% endif %}">
                {% if field.name == 'ativo' %}
                <div class="form-check form-switch mt-2">
                    {{ field }}
                    <label class="form-check-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
                </div>
                {% else %}
                <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% endif %}
                {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="modal-footer justify-content-between bg-white">
        <button type="button" class="financeiro-modal-btn financeiro-modal-btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="financeiro-modal-btn financeiro-modal-btn-primary">
            <i class="bi bi-check2-circle me-1"></i> {{ submit_label }}
        </button>
    </div>
</form>
