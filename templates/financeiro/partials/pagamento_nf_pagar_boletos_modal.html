{% load moeda l10n %}
<style>
    .financeiro-modal-btn {
        border: none;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: .55rem;
        min-height: 42px;
        padding: .68rem 1rem;
        border-radius: 999px;
        font-weight: 700;
        line-height: 1;
        transition: all .2s ease;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }
    .financeiro-modal-btn-light {
        background: #fff;
        color: #0f172a;
        border: 1px solid #dbe4ee;
    }
    .financeiro-modal-btn-primary {
        color: #fff;
        border: 1px solid transparent;
        background: #008000;
    }
    .financeiro-modal-btn-primary:disabled,
    .financeiro-modal-btn-primary.disabled {
        color: #fff;
        background: #94a3b8;
        border-color: #94a3b8;
        box-shadow: none;
        cursor: not-allowed;
        opacity: 1;
    }
    .financeiro-boleto-pay-row {
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        background: #fff;
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
        transition: background-color .18s ease, border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .financeiro-boleto-pay-row.is-selected {
        border-color: {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}{{ request.empresa_ativa.cor_tema }}{% else %}#2563eb{% endif %};
        background: #f0fdf4;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        transform: translateY(-1px);
    }
    .financeiro-boleto-pay-check {
        width: 1.15rem;
        height: 1.15rem;
        border-width: 2px;
        cursor: pointer;
    }
    .financeiro-boleto-pay-check:checked {
        background-color: {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}{{ request.empresa_ativa.cor_tema }}{% else %}#2563eb{% endif %};
        border-color: {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}{{ request.empresa_ativa.cor_tema }}{% else %}#2563eb{% endif %};
        box-shadow: 0 0 0 .22rem rgba(34, 197, 94, 0.18);
    }
    .financeiro-boleto-pay-check:focus {
        border-color: {% if request.empresa_ativa and request.empresa_ativa.cor_tema %}{{ request.empresa_ativa.cor_tema }}{% else %}#2563eb{% endif %};
        box-shadow: 0 0 0 .22rem rgba(34, 197, 94, 0.22);
    }
</style>

<div class="modal-header">
    <div>
        <h5 class="modal-title fw-bold mb-1">Pagar boletos</h5>
        <div class="text-muted small">Nota Fiscal nº {{ nf.numero_nf }} · {{ nf.fornecedor.nome }}</div>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form
    method="post"
    hx-post="{{ post_url }}"
    hx-target="#modal-content"
    hx-swap="innerHTML"
    data-no-global-loading
    class="d-flex flex-column"
    style="max-height: calc(100vh - 9rem);"
    id="boleto-pagamentos-multiplos-form">
    {% csrf_token %}
    <input type="hidden" name="action" value="salvar_multiplos">

    <div class="modal-body overflow-auto flex-grow-1 py-3">
        <div class="rounded-4 border bg-light p-3 mb-3">
            <label class="form-label fw-semibold small mb-1" for="conta_bancaria_multiplos">Pagamento realizado em</label>
            <select class="form-select rounded-3" id="conta_bancaria_multiplos" name="conta_bancaria">
                <option value="">DINHEIRO</option>
                {% for conta in contas_bancarias_pagamento %}
                {% with conta_pk=conta.pk|unlocalize %}
                <option value="{{ conta_pk }}"{% if selected_conta_bancaria_id == conta_pk %} selected{% endif %}>{{ conta.nome }} — {{ conta.banco }}</option>
                {% endwith %}
                {% endfor %}
            </select>
        </div>

        <div class="d-grid gap-2">
            {% for boleto in boletos %}
            {% with boleto_pk=boleto.pk|unlocalize %}
            <div class="financeiro-boleto-pay-row p-3{% if boleto.is_selected %} is-selected{% endif %}">
                <div class="row g-3 align-items-center">
                    <div class="col-12 col-lg-7">
                        <label class="d-flex gap-3 align-items-start mb-0">
                            <input
                                class="form-check-input financeiro-boleto-pay-check mt-1 js-boleto-pay-check"
                                type="checkbox"
                                name="boletos"
                                value="{{ boleto_pk }}"
                                {% if boleto.is_selected %}checked{% endif %}>
                            <span class="flex-grow-1">
                                <span class="d-flex flex-wrap justify-content-between gap-2">
                                    <strong>{{ boleto.numero_doc|default:"Sem número" }}</strong>
                                    <span class="badge {{ boleto.situacao_badge_class }}">{{ boleto.situacao_label }}</span>
                                </span>
                                <span class="d-flex flex-wrap gap-3 small text-muted mt-1">
                                    <span>Parcela {{ boleto.parcela }}</span>
                                    <span>Vencimento {{ boleto.vencimento|date:"d/m/Y" }}</span>
                                    <span class="fw-semibold text-body">R$ {{ boleto.valor|moeda_br }}</span>
                                </span>
                            </span>
                        </label>
                    </div>
                    <div class="col-12 col-lg-5">
                        <label class="form-label fw-semibold small mb-1" for="data_pagamento_{{ boleto_pk }}">Data de pagamento</label>
                        <input
                            type="date"
                            id="data_pagamento_{{ boleto_pk }}"
                            name="data_pagamento_{{ boleto_pk }}"
                            class="form-control rounded-3"
                            value="{{ boleto.data_pagamento_valor }}">
                    </div>
                </div>
            </div>
            {% endwith %}
            {% endfor %}
        </div>
    </div>

    <div class="modal-footer flex-shrink-0 bg-white justify-content-between gap-3">
        <div class="text-danger small fw-semibold flex-grow-1">
            {% if erros %}
                {% for erro in erros %}
                    <div>{{ erro }}</div>
                {% endfor %}
            {% endif %}
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="financeiro-modal-btn financeiro-modal-btn-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="financeiro-modal-btn financeiro-modal-btn-primary" id="btnConfirmarPagamentosMultiplos">
                <i class="bi bi-check2-circle me-1"></i> Confirmar pagamentos
            </button>
        </div>
    </div>
</form>

<script>
(function () {
    var form = document.getElementById('boleto-pagamentos-multiplos-form');
    var button = document.getElementById('btnConfirmarPagamentosMultiplos');
    if (!form || !button) return;
    var buttonDefaultHtml = button.innerHTML;

    function syncBoletoRows() {
        var hasSelected = false;
        form.querySelectorAll('.financeiro-boleto-pay-row').forEach(function (row) {
            var checkbox = row.querySelector('.js-boleto-pay-check');
            var isSelected = !!checkbox && checkbox.checked;
            if (isSelected) hasSelected = true;
            row.classList.toggle('is-selected', isSelected);
        });
        button.disabled = !hasSelected;
    }

    form.querySelectorAll('.js-boleto-pay-check').forEach(function (checkbox) {
        checkbox.addEventListener('change', syncBoletoRows);
    });
    syncBoletoRows();

    function setSubmitting() {
        button.disabled = true;
        button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Confirmando...';
    }

    function resetSubmitting() {
        button.innerHTML = buttonDefaultHtml;
        syncBoletoRows();
    }

    form.addEventListener('htmx:beforeRequest', function () {
        setSubmitting();
    });

    form.addEventListener('htmx:afterRequest', function (event) {
        if (!event.detail.successful) {
            resetSubmitting();
        }
    });

    form.addEventListener('htmx:sendError', resetSubmitting);
    form.addEventListener('htmx:responseError', resetSubmitting);
    form.addEventListener('htmx:timeout', resetSubmitting);
})();
</script>
