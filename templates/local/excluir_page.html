{% extends 'base.html' %}

{% block title %}Excluir local | Genesis ERP{% endblock %}

{% block content %}
<style>
    .page-card {
        border: 1px solid #d9e2ec;
        border-radius: 1.25rem;
        background: #fff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
        overflow: hidden;
    }
    .page-card-head {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #e5edf5;
        background: #fff;
    }
    .page-title {
        font-size: 1.35rem;
        font-weight: 800;
        color: #0f172a;
        margin: 0;
    }
    .page-body {
        padding: 1.25rem;
        background: #f8fafc;
    }
</style>

<div class="page-card mb-4">
    <div class="page-card-head">
        <h1 class="page-title">Excluir local</h1>
        <div class="text-muted mt-1">Esta ação não pode ser desfeita.</div>
    </div>
    <div class="page-body">
        <div class="alert alert-warning">
            Tem certeza que deseja excluir o local <strong>{{ local.nome }}</strong>?
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'local:detalhe' empresa_id=request.empresa_ativa.pk pk=local.pk %}"
                   class="btn btn-outline-secondary rounded-3 fw-semibold">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-danger rounded-3 fw-semibold">
                    <i class="bi bi-trash me-1"></i> Excluir
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
