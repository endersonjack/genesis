{% for message in messages %}
    <div
        class="toast align-items-end border-0 js-genesis-toast
        {% if message.tags == 'success' %} text-bg-success
        {% elif message.tags == 'error' %} text-bg-danger
        {% elif message.tags == 'warning' %} text-bg-warning
        {% else %} text-bg-primary
        {% endif %}"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
        data-bs-delay="5200"
        data-bs-autohide="true">
        <div class="toast-header border-0 bg-transparent">
            <button
                type="button"
                class="btn-close btn-close-white ms-auto m-auto"
                data-bs-dismiss="toast"
                aria-label="Fechar"></button>
        </div>
        <div class="toast-body">
            {{ message }}
        </div>
    </div>
{% endfor %}
