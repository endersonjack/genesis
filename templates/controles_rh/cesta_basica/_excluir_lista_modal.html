<div class="modal-header">
    <h5 class="modal-title fw-bold">Excluir Cesta Básica</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form
    method="post"
    hx-post="{% url 'controles_rh:excluir_cesta_basica_lista' empresa_id=request.empresa_ativa.pk pk=lista.pk %}"
    hx-target="#modal-content"
    hx-swap="innerHTML">
    {% csrf_token %}

    <div class="modal-body">
        <div class="alert alert-warning mb-3">
            <strong>Atenção:</strong> esta ação remove o controle de Cesta Básica e todas as linhas desta competência.
        </div>
        <p class="mb-2">Deseja realmente excluir?</p>
        <div class="border rounded-4 p-3 bg-light">
            <div><strong>Competência:</strong> {{ competencia.referencia }}</div>
            <div><strong>Empresa:</strong> {{ competencia.empresa }}</div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Excluir
        </button>
    </div>
</form>
