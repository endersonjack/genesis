{# Skeleton imita linhas da lista de controles (ícone + título + badge + descrição + chevron) #}
<div class="controle-list controle-list--solo" aria-hidden="true">
    <div class="controle-list-item comp-sk-item">
        <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-start gap-3 min-w-0 flex-grow-1">
                <div class="comp-sk-icon" aria-hidden="true"></div>
                <div class="min-w-0 flex-grow-1">
                    <div class="comp-sk-line comp-sk-line--title mb-2"></div>
                    <div class="comp-sk-line comp-sk-line--short mb-2"></div>
                    <div class="comp-sk-line comp-sk-line--tiny"></div>
                </div>
            </div>
            <div class="comp-sk-chevron flex-shrink-0" aria-hidden="true"></div>
        </div>
    </div>
    <div class="controle-list-item comp-sk-item">
        <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-start gap-3 min-w-0 flex-grow-1">
                <div class="comp-sk-icon" aria-hidden="true"></div>
                <div class="min-w-0 flex-grow-1">
                    <div class="comp-sk-line comp-sk-line--title mb-2" style="width:72%"></div>
                    <div class="comp-sk-line comp-sk-line--short mb-2"></div>
                    <div class="comp-sk-line comp-sk-line--tiny" style="width:88%"></div>
                </div>
            </div>
            <div class="comp-sk-chevron flex-shrink-0" aria-hidden="true"></div>
        </div>
    </div>
    <div class="controle-list-item comp-sk-item">
        <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-start gap-3 min-w-0 flex-grow-1">
                <div class="comp-sk-icon" aria-hidden="true"></div>
                <div class="min-w-0 flex-grow-1">
                    <div class="comp-sk-line comp-sk-line--title mb-2" style="width:55%"></div>
                    <div class="comp-sk-line comp-sk-line--short mb-2" style="width:40%"></div>
                    <div class="comp-sk-line comp-sk-line--tiny" style="width:65%"></div>
                </div>
            </div>
            <div class="comp-sk-chevron flex-shrink-0" aria-hidden="true"></div>
        </div>
    </div>
</div>
