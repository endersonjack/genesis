<div class="modal-header">
    <h5 class="modal-title fw-bold">Excluir Controle de Vale Transporte</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form
    method="post"
    hx-post="{% url 'controles_rh:excluir_tabela_vt' tabela.pk %}"
    hx-target="#modal-content"
    hx-swap="innerHTML">
    {% csrf_token %}

    <div class="modal-body">
        <div class="alert alert-warning mb-3">
            <strong>Atenção:</strong> esta ação removerá o controle de Vale Transporte e todos os itens vinculados a ele.
        </div>

        <p class="mb-2">Deseja realmente excluir este controle?</p>

        <div class="border rounded-4 p-3 bg-light">
            <div><strong>Nome:</strong> {{ tabela.nome }}</div>
            <div><strong>Competência:</strong> {{ competencia.referencia }}</div>
            <div><strong>Empresa:</strong> {{ competencia.empresa }}</div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
        </button>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Excluir
        </button>
    </div>
</form>
