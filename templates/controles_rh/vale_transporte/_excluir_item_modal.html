<div class="modal-header">
    <h5 class="modal-title fw-bold">Excluir Linha de VT</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>

<form
    method="post"
    data-no-global-loading
    hx-post="{% url 'controles_rh:excluir_item_vt' empresa_id=request.empresa_ativa.pk pk=item.pk %}"
    hx-target="#modal-content"
    hx-swap="innerHTML">
    {% csrf_token %}

    <div class="modal-body">
        <div class="alert alert-warning mb-3">
            <strong>Atenção:</strong> esta ação removerá esta linha da tabela de VT.
        </div>

        <div class="border rounded-4 p-3 bg-light">
            <div><strong>Nome:</strong> {{ item.nome_exibicao }}</div>
            <div><strong>Tabela:</strong> {{ tabela.nome }}</div>
            <div><strong>Competência:</strong> {{ competencia.referencia }}</div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
        </button>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Excluir
        </button>
    </div>
</form>
